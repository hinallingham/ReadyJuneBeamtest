[Corryvreckan]
log_level  = "INFO"
log_format = "DEFAULT"
workers = 4
log_file = "template_analysis_debug.txt"

detectors_file         = "/home/hinata/MALTA2/Ready_June/geometry/2malta_dut/2maltaDUT_aligned.conf"
#detectors_file_updated = "@GEOM_OUT.conf@"
histogram_file         = "Analysis_run@RUN@.root"
number_of_events = -1

[EventLoaderMALTA]
real_data = true
detector_names = "MALTA_0", "MALTA_1", "MALTA_2"
base_path = "/home/hinata/MALTA2/JunBeamTest/sim/output"
run_number = 008
online_mode = true
# Streaming control parameters for active beam test monitoring

#[FilterEvents]
#max_clusters_per_plane = 5

[ClusteringSpatial]
use_trigger_timestamp = true
charge_weighting = false
reject_by_roi = false

[Correlations]

[Tracking4D]
track_model = "straightline"
require_detectors = "MALTA_0", "MALTA_2"
min_hits_on_track = 2
time_cut_abs = 10ns
spatial_cut_abs = 50um, 50um  # Tightened cut for pre-aligned state
exclude_dut = true
reject_by_roi = true

[DUTAssociation]
# log_level  = "DEBUG"
spatial_cut_abs=100um,100um
time_cut_abs=1e99
use_cluster_centre=true

[AnalysisDUT]
correlation = true
time_cut_frameedge = 0ns
chi2ndof_cut = 5.
use_closest_cluster = false


[AnalysisEfficiency]
time_cut_frameedge = 0ns
chi2ndof_cut = 10.0
masked_pixel_distance_cut = 0
spatial_cut_sensoredge = 0
inpixel_cut_edge = 0

#[AnalysisTracks]

[OnlineMonitor]
update = 10
canvas_title = "MALTA2 Telescope Online Monitor Server"
clustering_module = "ClusteringSpatial"
tracking_module = "Tracking4D"
ignore_aux = true
#influxdb_url   = "http://localhost:8086"
#influxdb_token = "malta-monitor-token"
auto_save_dir  = "/home/hinata/MALTA2/Ready_June/grafana-monitor/snapshots/"

#Interactive 2D GUI Layout Specifications for Real-time Beam Monitoring
correlation_x2d = [["Correlations/%DETECTOR%/correlationX_2Dlocal", "colz"]]
correlation_y2d = [["Correlations/%DETECTOR%/correlationY_2Dlocal", "colz"]]

dut_plots = [["ClusteringSpatial/%DUT%/clusterPositionLocal", "colz"], ["ClusteringSpatial/%DUT%/clusterSize"], ["AnalysisDUT/%DUT%/clusterChargeAssociated"], ["AnalysisDUT/%DUT%/associatedTracksVersusTime"]]
