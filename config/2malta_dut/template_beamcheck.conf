[Corryvreckan]
log_level  = "WARNING"
log_format = "DEFAULT"
detectors_file         = "@GEOM_IN@"
detectors_file_updated = "@GEOM_OUT@"
histogram_file         = "beamcheck_run@RUN@.root"
number_of_events = 5000

[EventLoaderMALTA]
detector_names = "MALTA_0", "MALTA_1", "MALTA_2"
base_path = "/home/hinata/MALTA2/JunBeamTest/sim/output"
run_number = @RUN@

[ClusteringSpatial]
charge_weighting = false
reject_by_roi = false

[MaskCreator]
method = "frequency"
frequency_cut = 50
write_new_config = true
mask_dead_pixels = false
