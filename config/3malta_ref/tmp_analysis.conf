[Corryvreckan]
log_level  = "INFO"
log_format = "DEFAULT"
workers = 4
log_file = "template_analysis_noDUT_debug.txt"

detectors_file         = "/home/hinata/MALTA2/Ready_June/geometry/3malta_ref/3malta_aligned.conf"
#detectors_file_updated = "../../geometry/3malta_ref/3malta_aligned.conf_final"
histogram_file         = "Analysis_noDUT_run002.root"
number_of_events = -1

[EventLoaderMALTA]
real_data = true
detector_names = "MALTA_0", "MALTA_1", "MALTA_2"
base_path = "/home/hinata/MALTA2/JunBeamTest/sim/output"
run_number = 008
online_mode = true

#[FilterEvents]
#max_clusters_per_plane = 5

[ClusteringSpatial]
use_trigger_timestamp = true
charge_weighting = false
reject_by_roi = false

[Correlations]

[Tracking4D]
track_model = "straightline"
require_detectors = "MALTA_0", "MALTA_1", "MALTA_2"
min_hits_on_track = 3
time_cut_abs = 10ns
spatial_cut_abs = 50um, 50um
exclude_dut = false
reject_by_roi = true

[AnalysisTracks]

[OnlineMonitor]
update = 10
canvas_title = "MALTA2 3-Plane Telescope Online Monitor"
clustering_module = "ClusteringSpatial"
tracking_module = "Tracking4D"
ignore_aux = true
#influxdb_url   = "http://localhost:8086"
#influxdb_token = "malta-monitor-token"
auto_save_dir  = "/home/hinata/MALTA2/Ready_June/grafana-monitor/snapshots/"

correlation_x2d = [["Correlations/%DETECTOR%/correlationX_2Dlocal", "colz"]]
correlation_y2d = [["Correlations/%DETECTOR%/correlationY_2Dlocal", "colz"]]
