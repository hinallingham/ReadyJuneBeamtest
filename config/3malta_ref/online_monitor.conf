[Corryvreckan]
log_level  = "INFO"
log_format = "DEFAULT"
workers = 4
log_file = "online_monitor_debug.txt"

# Lock the geometry to the high-precision aligned state
detectors_file   = "../../geometry/3malta_ref/3malta_aligned.conf"
histogram_file   = "online_monitor_run@RUN@.root"
number_of_events = -1

[EventLoaderMALTA]
detector_names = "MALTA_0", "MALTA_1", "MALTA_2"
base_path = "../../output"
run_number = @RUN@
# Streaming control parameters for active beam test monitoring

[ClusteringSpatial]
use_trigger_timestamp = true

[Correlations]

[Tracking4D]
track_model = "straightline"
require_detectors = "MALTA_0", "MALTA_1", "MALTA_2"
min_hits_on_track = 3
time_cut_abs = 10ns
spatial_cut_abs = 50um, 50um  # Tightened cut for pre-aligned state
exclude_dut = false
reject_by_roi = true

[AnalysisEfficiency]

[AnalysisTracks]

[OnlineMonitor]
update = 500
canvas_title = "MALTA2 Telescope Online Monitor Server"
clustering_module = "ClusteringSpatial"
tracking_module = "Tracking4D"
ignore_aux = true

# Interactive 2D GUI Layout Specifications for Real-time Beam Monitoring
correlation_x2d = [["Correlations/%DETECTOR%/correlationX_2Dlocal", "colz"]]
correlation_y2d = [["Correlations/%DETECTOR%/correlationY_2Dlocal", "colz"]]

overview = [
    ["ClusteringSpatial/%DETECTOR%/hitmap", "colz"],
    ["ClusteringSpatial/%DETECTOR%/clusterSize", "hist"],
    ["Correlations/%DETECTOR%/correlationX_2Dlocal", "colz"]
]