[Corryvreckan]
log_level  = "INFO"
log_format = "DEFAULT"
workers = 4
log_file = "template_analysis_debug.txt"

detectors_file         = "/home/hinata/MALTA2/Ready_June/geometry/3malta_ref/3malta_aligned.conf"
#detectors_file_updated = "@GEOM_OUT@"
histogram_file         = "Analysis_run@RUN@.root"
number_of_events = -1

[EventLoaderMALTA]
detector_names = "MALTA_0", "MALTA_1", "MALTA_2"
base_path = "/home/hinata/MALTA2/JunBeamTest/sim/output"
run_number = 002
# Streaming control parameters for active beam test monitoring

[ClusteringSpatial]
use_trigger_timestamp = true
charge_weighting = false
reject_by_roi = false

[Correlations]

[Tracking4D]
track_model = "straightline"
require_detectors = "MALTA_0", "MALTA_1", "MALTA_2"
min_hits_on_track = 3
time_cut_abs = 10ns
spatial_cut_abs = 50um, 50um  # Tightened cut for pre-aligned state
exclude_dut = false
reject_by_roi = true

#[AnalysisEfficiency]
#[AnalysisBeamProfile]
#charge_weighting = false
#fitted_profile = true

[AnalysisTracks]

[OnlineMonitor]
update = 200
canvas_title = "Run 00042 — MALTA2 Testbeam"
clustering_module = "ClusteringSpatial"
target_events = 1000000
telescop_reset_tracks = 500
auto_save_interval = 60
auto_save_dir = "/data/snapshots/"

