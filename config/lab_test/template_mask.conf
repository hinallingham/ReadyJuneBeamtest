[Corryvreckan]
log_level  = "INFO"
log_format = "DEFAULT"
detectors_file         = "@GEOM_IN@"
detectors_file_updated = "@GEOM_OUT@"
histogram_file         = "pedestal_masking_run@RUN@.root"
number_of_events = -1

[EventLoaderMALTA]
real_data = true
detector_names = "MALTA_0", "MALTA_1", "MALTA_2"
base_path = "/home/hinata/MALTA2/JunBeamTest/sim/output"
run_number = @RUN@

[ClusteringSpatial]
charge_weighting = false
reject_by_roi = false

[MaskCreator]
method = "localdensity"
density_bandwidth = 2
sigma_above_avg_max = 5
write_new_config = true
mask_dead_pixels = false